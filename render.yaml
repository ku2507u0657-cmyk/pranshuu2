services:
  - type: web
    name: invoiceflow
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --workers 1 --bind 0.0.0.0:$PORT --timeout 120"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: invoiceflow-db
          property: connectionString
      - key: SCHEDULER_ENABLED
        value: "True"
      - key: MAIL_ENABLED
        value: "False"

databases:
  - name: invoiceflow-db
    databaseName: invoiceflow
    plan: free
