{% extends "base.html" %}

{% block page_title %}
Setup Business
{% endblock %}

{% block content %}
<div class="card p-4 shadow-sm" style="max-width:600px;margin:auto;">
  <h4 class="mb-4">Setup Your Business</h4>

  <form method="POST">

    <div class="mb-3">
      <input class="form-control" name="business_name" placeholder="Business Name"
             value="{{ profile.business_name if profile else '' }}" required>
    </div>

    <div class="mb-3">
      <input class="form-control" name="owner_name" placeholder="Owner Name"
             value="{{ profile.owner_name if profile else '' }}">
    </div>

    <div class="mb-3">
      <input class="form-control" name="upi_id" placeholder="UPI ID"
             value="{{ profile.upi_id if profile else '' }}">
    </div>

    <div class="mb-3">
      <input class="form-control" name="gst_number" placeholder="GST Number"
             value="{{ profile.gst_number if profile else '' }}">
    </div>

    <div class="mb-3">
      <textarea class="form-control" name="address" placeholder="Address">{{ profile.address if profile else '' }}</textarea>
    </div>

    <div class="mb-3">
      <input class="form-control" name="phone" placeholder="Phone"
             value="{{ profile.phone if profile else '' }}">
    </div>

    <div class="mb-3">
      <input class="form-control" name="email" placeholder="Email"
             value="{{ profile.email if profile else '' }}">
    </div>

    <button type="submit" class="btn btn-dark w-100">
      Save & Continue
    </button>

  </form>
</div>
{% endblock %}
